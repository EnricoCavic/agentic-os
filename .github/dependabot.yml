version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
  # Pinned CI test deps (#163) — keep .github/requirements-ci.txt fresh.
  - package-ecosystem: "pip"
    directory: "/.github"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
